<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Exportar colores IFC</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      margin: 12px;
      color: #1f2937;
    }
    button {
      padding: 6px 12px;
      margin-right: 6px;
      cursor: pointer;
    }
    #log {
      white-space: pre-wrap;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 8px;
      margin-top: 12px;
      max-height: 320px;
      overflow: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <p><strong>Exportar colores IFC</strong></p>

  <button id="export">Exportar CSV</button>

  <pre id="log"></pre>

  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <script>
    const SCRIPT_VERSION = "v4 (2026-06-08)";
    let API = null;

    const log = (txt) => {
      document.getElementById("log").textContent += txt + "\n";
    };

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    function downloadText(filename, text) {
      // BOM para que Excel abra el CSV con acentos correctamente
      const blob = new Blob(["\uFEFF" + text], { type: "text/csv;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function extractRevisionCode(text) {
      const match = String(text || "").match(/RFI[_\-\s]*\d+/i);
      return match ? match[0].replace(/[\-\s]/g, "_").toUpperCase() : "";
    }

    // ---------------------------------------------------------------
    // FIX 2: Detección de la revisión (código RFI) desde la vista activa
    // El único campo de título real en ViewSpec es "name" (y "description").
    // Si la vista activa no trae nombre, intentamos cruzar su id con getViews().
    // ---------------------------------------------------------------
    // Intenta leer la vista activa con reintentos: getCurrentView() devuelve
    // undefined si el visor aún no ha "registrado" la vista (problema de timing).
    // Por eso reintentamos con pausas hasta que devuelva algo con nombre.
    async function getCurrentRevisionCode() {
      let currentView = null;

      for (let attempt = 1; attempt <= 6; attempt++) {
        const candidates = [];

        try {
          currentView = await API.view.getCurrentView();
          if (currentView) {
            if (currentView.name) candidates.push(currentView.name);
            if (currentView.description) candidates.push(currentView.description);

            // Si la vista activa tiene id pero no nombre, lo buscamos en la lista de vistas guardadas
            if (currentView.id && !currentView.name) {
              try {
                const allViews = await API.view.getViews();
                const match = (allViews || []).find((v) => v.id === currentView.id);
                if (match) {
                  if (match.name) candidates.push(match.name);
                  if (match.description) candidates.push(match.description);
                }
              } catch (e) {
                /* getViews puede no estar disponible; seguimos */
              }
            }
          }
        } catch (e) {
          /* la vista puede no estar lista todavía; reintentamos */
        }

        for (const text of candidates) {
          const code = extractRevisionCode(text);
          if (code) {
            log("Vista activa detectada: " + text);
            log("Código de revisión detectado: " + code);
            return code;
          }
        }

        if (attempt < 6) {
          log("La vista activa aún no está lista... intento " + attempt + "/6");
          await sleep(700);
        }
      }

      log("ERROR: No se ha encontrado código RFI.");
      log("Trimble no ha devuelto un nombre de vista con formato RFI_XXXXX.");
      log("Asegúrate de estar situado en la vista cuyo título contiene el código RFI.");
      log("Vista detectada (para depurar):");
      log(JSON.stringify(currentView, null, 2));
      return "";
    }

    function colorToText(color) {
      if (!color) return "";
      if (typeof color === "string") return color;
      if (typeof color === "object") {
        const r = color.r ?? color.red ?? "";
        const g = color.g ?? color.green ?? "";
        const b = color.b ?? color.blue ?? "";
        const a = color.a ?? color.alpha ?? "";
        if (r !== "" && g !== "" && b !== "") {
          return a !== "" ? `rgba(${r},${g},${b},${a})` : `rgb(${r},${g},${b})`;
        }
        return JSON.stringify(color);
      }
      return String(color);
    }

    // getColoredObjects() devuelve ModelObjects[]:
    //   [{ modelId: string, objects: ObjectProperties[] }]
    // y cada ObjectProperties tiene { id: number (runtime id), color?: string, ... }
    async function getColoredObjectEntries() {
      const coloredGroups = await API.viewer.getColoredObjects();
      const entries = [];

      for (const group of coloredGroups || []) {
        const modelId = group.modelId || "";
        const objects = group.objects || [];

        for (const obj of objects) {
          const objectRuntimeId = Number(obj.id);
          const color = colorToText(obj.color);

          if (modelId && Number.isFinite(objectRuntimeId)) {
            entries.push({ modelId, objectRuntimeId, color });
          }
        }
      }

      return entries;
    }

    async function getColoredObjectEntriesWithRetry() {
      for (let attempt = 1; attempt <= 5; attempt++) {
        const entries = await getColoredObjectEntries();
        if (entries.length > 0) return entries;
        log("Esperando datos del visor... intento " + attempt + "/5");
        await sleep(700);
      }
      return [];
    }

    // ---------------------------------------------------------------
    // FIX 3: convertToObjectIds devuelve el GUID SIN COMPRIMIR (tipo "GUID MS",
    // un UUID 01f1b6a7-5287-48ce-9204-b6296f9b1e7a). Nosotros necesitamos el
    // "GUID (IFC)" comprimido a 22 caracteres (01yRQdKeT8pf84jYblcnvw), que es
    // el GlobalId canónico del IFC. Esta función lo comprime.
    // ---------------------------------------------------------------
    const IFC_CHARS = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz_$";

    function ifcB64(v, len) {
      let s = "";
      for (let i = 0; i < len; i++) {
        s += IFC_CHARS[Math.floor(v / Math.pow(64, len - i - 1)) % 64];
      }
      return s;
    }

    function compressIfcGuid(uuid) {
      const hex = String(uuid).replace(/-/g, "").toLowerCase();
      if (hex.length !== 32 || /[^0-9a-f]/.test(hex)) return null;
      const bs = [];
      for (let i = 0; i < 32; i += 2) bs.push(parseInt(hex.substr(i, 2), 16));
      let res = ifcB64(bs[0], 2);
      for (let i = 1; i < 16; i += 3) {
        res += ifcB64((bs[i] << 16) + (bs[i + 1] << 8) + bs[i + 2], 4);
      }
      return res;
    }

    // Devuelve siempre el GUID IFC comprimido (22 chars).
    // Acepta tanto el UUID sin comprimir como el comprimido ya hecho.
    function toIfcGuid(externalId) {
      if (!externalId) return "";
      const s = String(externalId).trim();
      if (s.length === 22 && /^[0-9A-Za-z_$]+$/.test(s)) return s; // ya comprimido
      const compressed = compressIfcGuid(s);
      return compressed || s; // si no era un UUID reconocible, lo dejamos tal cual
    }

    // ---------------------------------------------------------------
    // FIX 1: Conversión resiliente de runtime IDs -> GUID IFC.
    // convertToObjectIds LANZA EXCEPCIÓN si algún runtime id del lote no
    // tiene GUID externo. Para que un único objeto sin GUID no tire el lote
    // entero, partimos en mitades hasta aislar solo los IDs problemáticos.
    // Devuelve un array alineado con runtimeIds, con "" donde no hay GUID.
    // ---------------------------------------------------------------
    let lastConvertError = "";

    async function convertResilient(modelId, runtimeIds) {
      if (runtimeIds.length === 0) return [];

      try {
        const ids = await API.viewer.convertToObjectIds(modelId, runtimeIds);
        return runtimeIds.map((_, i) => ids[i] || "");
      } catch (e) {
        if (!lastConvertError) lastConvertError = String(e && e.message ? e.message : e);
        if (runtimeIds.length === 1) {
          // Este objeto no tiene GUID IFC (p.ej. nodo padre / sin external id)
          return [""];
        }
        const mid = Math.floor(runtimeIds.length / 2);
        const left = await convertResilient(modelId, runtimeIds.slice(0, mid));
        const right = await convertResilient(modelId, runtimeIds.slice(mid));
        return left.concat(right);
      }
    }

    async function exportCsv() {
      document.getElementById("log").textContent = "";
      lastConvertError = "";
      log("Script versión: " + SCRIPT_VERSION);

      // Leemos primero los objetos coloreados: además de necesitarlos, esto
      // "calienta" el visor para que getCurrentView() devuelva ya la vista activa.
      log("Leyendo objetos coloreados...");
      const entries = await getColoredObjectEntriesWithRetry();

      if (entries.length === 0) {
        log("No se han encontrado objetos coloreados en la vista activa.");
        return;
      }
      log("Objetos coloreados detectados: " + entries.length);

      const revisionCode = await getCurrentRevisionCode();
      if (!revisionCode) return;

      const groupsByModel = new Map();
      for (const entry of entries) {
        if (!groupsByModel.has(entry.modelId)) groupsByModel.set(entry.modelId, []);
        groupsByModel.get(entry.modelId).push(entry);
      }

      const rows = [];

      for (const [modelId, modelEntries] of groupsByModel.entries()) {
        log("Modelo: " + modelId);
        const batchSize = 200;

        for (let i = 0; i < modelEntries.length; i += batchSize) {
          const batchEntries = modelEntries.slice(i, i + batchSize);
          const runtimeIds = batchEntries.map((e) => e.objectRuntimeId);

          const ifcGuids = await convertResilient(modelId, runtimeIds);

          for (let j = 0; j < batchEntries.length; j++) {
            const entry = batchEntries[j];
            rows.push({
              guidIfc: toIfcGuid(ifcGuids[j]),
              color: entry.color,
              revisionCode,
              modelId: entry.modelId,
              objectRuntimeId: entry.objectRuntimeId
            });
          }
          log("Procesados " + Math.min(i + batchSize, modelEntries.length) + " / " + modelEntries.length);
        }
      }

      const csv = [
        "GUID_IFC;color;codigo_revision;modelId;objectRuntimeId",
        ...rows.map((r) =>
          [r.guidIfc, r.color, r.revisionCode, r.modelId, r.objectRuntimeId]
            .map((v) => `"${String(v ?? "").replaceAll('"', '""')}"`)
            .join(";")
        )
      ].join("\n");

      downloadText(revisionCode + "_trimble_colores_guid_ifc.csv", csv);

      log("CSV generado.");
      log("Filas exportadas: " + rows.length);
      log("GUID IFC encontrados: " + rows.filter((r) => r.guidIfc).length);
      log("GUID IFC vacíos: " + rows.filter((r) => !r.guidIfc).length);
      if (lastConvertError) {
        log("Primer error de convertToObjectIds: " + lastConvertError);
      }
    }

    async function main() {
      // Conexión defensiva: el global puede llamarse TrimbleConnectWorkspace o WorkspaceAPI
      const ws = window.TrimbleConnectWorkspace || window.WorkspaceAPI;
      if (!ws || !ws.connect) {
        log("ERROR: no se ha cargado la librería Workspace API de Trimble.");
        return;
      }

      API = await ws.connect(window.parent);
      log("Conectado a Trimble Connect. Script versión: " + SCRIPT_VERSION);

      document.getElementById("export").onclick = async () => {
        try {
          await exportCsv();
        } catch (err) {
          console.error(err);
          log("ERROR: " + err.message);
        }
      };
    }

    main().catch((err) => {
      console.error(err);
      log("ERROR DE CONEXIÓN: " + err.message);
    });
  </script>
</body>
</html>
