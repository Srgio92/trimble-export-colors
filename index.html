<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Exportar colores IFC</title>
</head>
<body>
  <div style="font-family: Arial, sans-serif; font-size: 13px;">
    <p><strong>Exportar colores IFC</strong></p>

    <button id="export">Exportar CSV</button>
    <button id="debug">Descargar debug</button>

    <br><br>

    <label>Código o nombre de revisión, solo si Trimble no detecta la vista:</label><br>
    <input
      id="manualRevisionName"
      style="width: 95%; margin-top: 4px;"
      placeholder="Ejemplo: RFI_18861 o (RFI_18861) MÓDULO B..."
    >

    <pre id="log" style="white-space: pre-wrap;"></pre>
  </div>

  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <script>
    let API = null;

    const log = (txt) => {
      document.getElementById("log").textContent += txt + "\n";
    };

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function downloadText(filename, text) {
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    }

    function extractRevisionCode(text) {
      const match = String(text || "").match(/RFI[_\-\s]*\d+/i);
      return match ? match[0].replace(/[\-\s]/g, "_").toUpperCase() : "";
    }

    async function getCurrentRevisionCode() {
      let currentView = null;
      let viewName = "";

      try {
        if (API.view && API.view.getCurrentView) {
          currentView = await API.view.getCurrentView();

          viewName =
            currentView?.name ||
            currentView?.title ||
            currentView?.description ||
            currentView?.topic ||
            currentView?.viewName ||
            currentView?.data?.name ||
            currentView?.data?.title ||
            "";
        }
      } catch (e) {
        log("No se ha podido leer automáticamente la vista activa.");
      }

      let revisionCode = extractRevisionCode(viewName);

      if (revisionCode) {
        log("Vista activa detectada: " + viewName);
        log("Código de revisión detectado automáticamente: " + revisionCode);
        return revisionCode;
      }

      const manualText = document.getElementById("manualRevisionName")?.value || "";
      revisionCode = extractRevisionCode(manualText);

      if (revisionCode) {
        log("Código de revisión usado desde campo manual: " + revisionCode);
        return revisionCode;
      }

      log("ERROR: No se ha encontrado código RFI.");
      log("Trimble no ha devuelto nombre de vista activa.");
      log("Vista detectada:");
      log(JSON.stringify(currentView, null, 2));
      log("Introduce manualmente el nombre de la revisión o el código RFI en el campo superior.");

      return "";
    }

    function colorToText(color) {
      if (!color) return "";

      if (typeof color === "string") {
        return color;
      }

      if (typeof color === "object") {
        const r = color.r ?? color.red ?? "";
        const g = color.g ?? color.green ?? "";
        const b = color.b ?? color.blue ?? "";
        const a = color.a ?? color.alpha ?? "";

        if (r !== "" && g !== "" && b !== "") {
          return a !== "" ? `rgba(${r},${g},${b},${a})` : `rgb(${r},${g},${b})`;
        }

        return JSON.stringify(color);
      }

      return String(color);
    }

    async function getColoredObjectEntriesWithRetry() {
      for (let attempt = 1; attempt <= 5; attempt++) {
        const entries = await getColoredObjectEntries();

        if (entries.length > 0) {
          return entries;
        }

        log("Esperando datos del visor... intento " + attempt + "/5");
        await sleep(700);
      }

      return [];
    }

    async function getColoredObjectEntries() {
      const coloredGroups = await API.viewer.getColoredObjects();
      const entries = [];

      for (const group of coloredGroups || []) {
        const modelId = group.modelId || group.id || "";
        const objects = group.objects || group.objectIds || [];

        for (const obj of objects) {
          let objectRuntimeId = "";
          let color = "";

          if (typeof obj === "object") {
            objectRuntimeId = Number(
              obj.id ??
              obj.objectId ??
              obj.objectRuntimeId ??
              obj.runtimeId
            );

            color = colorToText(obj.color || group.color || "");
          } else {
            objectRuntimeId = Number(obj);
            color = colorToText(group.color || "");
          }

          if (modelId && Number.isFinite(objectRuntimeId)) {
            entries.push({
              modelId,
              objectRuntimeId,
              color
            });
          }
        }
      }

      return entries;
    }

    async function convertRuntimeIdsToIfcGuids(modelId, runtimeIds) {
      if (!API.viewer.convertToObjectIds) {
        throw new Error("API.viewer.convertToObjectIds no está disponible en este visor.");
      }

      const result = await API.viewer.convertToObjectIds(modelId, runtimeIds);

      return result || [];
    }

    async function exportCsv() {
      document.getElementById("log").textContent = "";

      const revisionCode = await getCurrentRevisionCode();

      if (!revisionCode) {
        return;
      }

      log("Leyendo objetos coloreados...");

      const entries = await getColoredObjectEntriesWithRetry();

      if (entries.length === 0) {
        log("No se han encontrado objetos coloreados en la vista activa.");
        return;
      }

      log("Objetos coloreados detectados: " + entries.length);

      const groupsByModel = new Map();

      for (const entry of entries) {
        if (!groupsByModel.has(entry.modelId)) {
          groupsByModel.set(entry.modelId, []);
        }

        groupsByModel.get(entry.modelId).push(entry);
      }

      const rows = [];

      for (const [modelId, modelEntries] of groupsByModel.entries()) {
        log("Modelo: " + modelId);

        const batchSize = 200;

        for (let i = 0; i < modelEntries.length; i += batchSize) {
          const batchEntries = modelEntries.slice(i, i + batchSize);
          const runtimeIds = batchEntries.map(e => e.objectRuntimeId);

          let ifcGuids = [];

          try {
            ifcGuids = await convertRuntimeIdsToIfcGuids(modelId, runtimeIds);
          } catch (err) {
            log("ERROR convirtiendo runtime IDs a GUID IFC:");
            log(err.message);
            ifcGuids = [];
          }

          for (let j = 0; j < batchEntries.length; j++) {
            const entry = batchEntries[j];

            rows.push({
              guidIfc: ifcGuids[j] || "",
              color: entry.color,
              revisionCode,
              modelId: entry.modelId,
              objectRuntimeId: entry.objectRuntimeId
            });
          }

          log("Procesados " + Math.min(i + batchSize, modelEntries.length) + " / " + modelEntries.length);
        }
      }

      const csv = [
        "GUID_IFC;color;codigo_revision;modelId;objectRuntimeId",
        ...rows.map(r =>
          [
            r.guidIfc,
            r.color,
            r.revisionCode,
            r.modelId,
            r.objectRuntimeId
          ].map(v => `"${String(v ?? "").replaceAll('"', '""')}"`).join(";")
        )
      ].join("\n");

      downloadText(revisionCode + "_trimble_colores_guid_ifc.csv", csv);

      log("CSV generado.");
      log("Filas exportadas: " + rows.length);
      log("GUID IFC encontrados: " + rows.filter(r => r.guidIfc).length);
      log("GUID IFC vacíos: " + rows.filter(r => !r.guidIfc).length);
    }

    async function exportDebug() {
      document.getElementById("log").textContent = "";

      log("Leyendo debug del visor...");

      const revisionCode = await getCurrentRevisionCode();
      const entries = await getColoredObjectEntriesWithRetry();

      if (entries.length === 0) {
        log("No se han encontrado objetos coloreados.");
        return;
      }

      const firstModelId = entries[0].modelId;
      const firstEntries = entries.filter(e => e.modelId === firstModelId).slice(0, 20);
      const runtimeIds = firstEntries.map(e => e.objectRuntimeId);

      let objectIds = [];

      try {
        objectIds = await convertRuntimeIdsToIfcGuids(firstModelId, runtimeIds);
      } catch (err) {
        objectIds = ["ERROR: " + err.message];
      }

      const debugText =
        "REVISION DETECTADA\n" +
        String(revisionCode || "") + "\n\n" +
        "PRIMER MODELO\n" +
        firstModelId + "\n\n" +
        "PRIMEROS OBJETOS COLOREADOS\n" +
        JSON.stringify(firstEntries, null, 2) + "\n\n" +
        "CONVERT TO OBJECT IDS\n" +
        JSON.stringify(objectIds, null, 2);

      downloadText("debug_trimble_export_colores.txt", debugText);

      log("Debug descargado: debug_trimble_export_colores.txt");
    }

    async function main() {
      API = await TrimbleConnectWorkspace.connect(window.parent);
      log("Conectado a Trimble Connect.");

      document.getElementById("export").onclick = async () => {
        try {
          await exportCsv();
        } catch (err) {
          console.error(err);
          log("ERROR: " + err.message);
        }
      };

      document.getElementById("debug").onclick = async () => {
        try {
          await exportDebug();
        } catch (err) {
          console.error(err);
          log("ERROR DEBUG: " + err.message);
        }
      };
    }

    main().catch(err => {
      console.error(err);
      log("ERROR DE CONEXIÓN: " + err.message);
    });
  </script>
</body>
</html>
